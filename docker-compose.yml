services:

  # Serveur Web Nginx
  nginx:
    image: nginx:alpine
    container_name: taskflow_nginx
    ports:
      - "9080:80"
    volumes:
      - ./public:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - taskflow_network

  # PHP 8.2
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: taskflow_php
    volumes:
      - ./public:/var/www/html
      - ./src:/var/www/src
    networks:
      - taskflow_network
    depends_on:
      - mysql

  # Base de données MySQL 8.0
  mysql:
    image: mysql:8.0
    container_name: taskflow_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: taskflow
      MYSQL_USER: taskflow_user
      MYSQL_PASSWORD: taskflow_pass
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3307:3306"
    networks:
      - taskflow_network

  # Adminer - Interface graphique MySQL
  adminer:
    image: adminer:latest
    container_name: taskflow_adminer
    ports:
      - "9082:8080"
    networks:
      - taskflow_network

  # MySQL Exporter — sans fichier, credentials en ligne de commande
  mysql_exporter:
    image: prom/mysqld-exporter:v0.15.1
    container_name: taskflow_mysql_exporter
    command:
      - "--mysqld.username=taskflow_user:taskflow_pass"
      - "--mysqld.address=mysql:3306"
      - "--collect.global_status"
      - "--collect.global_variables"
      - "--web.listen-address=:9104"
    ports:
      - "9104:9104"
    depends_on:
      - mysql
    networks:
      - taskflow_network
    restart: unless-stopped

  # Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: taskflow_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - taskflow_network

  # Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: taskflow_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=taskflow123
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - taskflow_network

volumes:
  mysql_data:
  prometheus_data:
  grafana_data:

networks:
  taskflow_network:
    driver: bridge