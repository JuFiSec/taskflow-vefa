server {
    listen 80;
    server_name localhost;
    root /var/www/html;
    index index.php index.html;

    # Logs
    access_log /var/log/nginx/taskflow_access.log;
    error_log /var/log/nginx/taskflow_error.log;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Traitement des fichiers PHP
    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Bloquer l'accès aux fichiers cachés (.env, .gitignore, etc.)
    location ~ /\. {
        deny all;
    }

    # Bloquer l'accès direct au dossier includes/
    location ~ ^/includes/ {
        deny all;
        return 403;
    }

    # Bloquer l'accès aux logs
    location ~ ^/logs/ {
        deny all;
        return 403;
    }
}